services:
  derekhuynen-mcp-server:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
